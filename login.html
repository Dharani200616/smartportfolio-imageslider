<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | YoungBot Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            min-height: 100vh;
            background: #dde4f8;
            font-family: 'Nunito', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative
        }

        /* Floating circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            animation: floatC ease-in-out infinite alternate
        }

        @keyframes floatC {
            from {
                transform: translateY(0)
            }

            to {
                transform: translateY(-18px)
            }
        }

        /* Right dark-blue wave panel */
        .wave-panel {
            position: fixed;
            right: -60px;
            top: -60px;
            width: 55vw;
            height: 110vh;
            background: linear-gradient(160deg, #1a28b8 0%, #1230e0 60%, #0f1fa8 100%);
            border-radius: 50% 0 0 50%;
            z-index: 0;
            overflow: hidden
        }

        .wave-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, .08), transparent 60%);
        }

        .wc {
            position: absolute;
            border-radius: 50%;
            border: 2.5px solid rgba(255, 255, 255, .25)
        }

        /* Floral illustration */
        .floral {
            position: absolute;
            right: 6vw;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            height: 320px;
            z-index: 2;
            animation: floatFloral 4s ease-in-out infinite alternate
        }

        @keyframes floatFloral {
            from {
                transform: translateY(-50%) translateY(0)
            }

            to {
                transform: translateY(-50%) translateY(-14px)
            }
        }

        /* Layout */
        .page {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 1100px;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: flex-start
        }

        /* Card */
        .card {
            background: rgba(189, 202, 248, .82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 48px 44px 42px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(26, 40, 184, .18), inset 0 1px 0 rgba(255, 255, 255, .5);
            animation: cardIn .8s cubic-bezier(.16, 1, .3, 1) both
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateX(-30px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        h1 {
            font-size: 30px;
            font-weight: 900;
            color: #1a28b8;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -.3px
        }

        /* Inputs */
        .field {
            margin-bottom: 16px;
            position: relative
        }

        input[type=text],
        input[type=email],
        input[type=password] {
            width: 100%;
            background: rgba(255, 255, 255, .65);
            border: 1.5px solid rgba(255, 255, 255, .8);
            border-radius: 14px;
            padding: 16px 20px;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: all .25s
        }

        input::placeholder {
            color: #9ba8cc
        }

        input:focus {
            border-color: #6278e8;
            background: rgba(255, 255, 255, .9);
            box-shadow: 0 0 0 4px rgba(99, 120, 232, .15)
        }

        input.valid {
            border-color: #4ade80 !important;
            background: rgba(240, 255, 244, .9) !important
        }

        input.invalid {
            border-color: #f87171 !important;
            background: rgba(255, 240, 240, .9) !important
        }

        .pw-wrap {
            position: relative
        }

        .pw-wrap input {
            padding-right: 46px
        }

        .eye-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 17px;
            color: #9ba8cc;
            padding: 0;
            line-height: 1;
            transition: color .2s
        }

        .eye-btn:hover {
            color: #4a5568
        }

        .msg {
            font-size: 11.5px;
            margin-top: 4px;
            min-height: 14px;
            padding-left: 4px;
            transition: all .2s
        }

        .msg.ok {
            color: #16a34a
        }

        .msg.err {
            color: #dc2626
        }

        .forgot {
            text-align: right;
            margin-top: -8px;
            margin-bottom: 16px
        }

        .forgot a {
            font-size: 12.5px;
            color: #4a5fd4;
            font-weight: 700;
            text-decoration: none
        }

        .forgot a:hover {
            text-decoration: underline
        }

        /* Login button */
        .btn-login {
            width: 100%;
            margin-top: 4px;
            background: linear-gradient(135deg, #1230e0, #1a28b8);
            border: none;
            border-radius: 14px;
            padding: 16px;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 17px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(18, 48, 224, .4);
            transition: all .3s
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 36px rgba(18, 48, 224, .55)
        }

        .btn-login:active {
            transform: translateY(0) scale(.98)
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, .3);
            transform: scale(0);
            animation: rpl .6s linear;
            pointer-events: none
        }

        @keyframes rpl {
            to {
                transform: scale(5);
                opacity: 0
            }
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, .35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 16px;
            color: #6278c8;
            font-size: 13.5px;
            font-weight: 700
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1.5px;
            background: rgba(99, 120, 200, .25)
        }

        /* Social buttons row */
        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .btn-social {
            background: rgba(255, 255, 255, .75);
            border: 1.5px solid rgba(255, 255, 255, .9);
            border-radius: 14px;
            padding: 13px 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 14.5px;
            font-weight: 700;
            color: #3a4080;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            position: relative;
            overflow: hidden;
            transition: all .25s;
            box-shadow: 0 2px 10px rgba(99, 120, 200, .15);
            text-decoration: none;
        }

        .btn-social:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 120, 200, .25);
            color: #1a28b8;
        }

        /* Academy link */
        .academy-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            font-weight: 800;
        }

        .academy-link a {
            color: #f59e0b;
            text-decoration: none;
            background: rgba(255, 255, 240, 0.3);
            padding: 6px 12px;
            border-radius: 40px;
            transition: all 0.2s;
        }

        .academy-link a:hover {
            background: #f59e0b;
            color: #1a28b8;
            text-decoration: none;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 22px;
            font-size: 14px;
            font-weight: 700;
            color: #4a5a9a
        }

        .footer a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 800
        }

        .footer a:hover {
            text-decoration: underline
        }

        /* Success screen */
        .success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 14px
        }

        .check-ring {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            background: rgba(34, 197, 94, .12);
            border: 2px solid rgba(34, 197, 94, .5);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn .6s cubic-bezier(.175, .885, .32, 1.275) both;
            box-shadow: 0 0 24px rgba(34, 197, 94, .25)
        }

        @keyframes popIn {
            from {
                transform: scale(0)
            }

            to {
                transform: scale(1)
            }
        }

        .check-path {
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
            animation: draw .6s .4s ease forwards
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0
            }
        }

        .s-title {
            color: #1a28b8;
            font-size: 22px;
            font-weight: 900;
            animation: fadeUp .5s .6s both
        }

        .s-sub {
            color: #6278c8;
            font-size: 14px;
            animation: fadeUp .5s .75s both
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @media(max-width:700px) {

            .wave-panel,
            .floral {
                display: none
            }

            .card {
                max-width: 100%
            }

            .page {
                justify-content: center
            }
        }
    </style>
</head>

    <script>
        // Ripple effect
        function addRipple(e, btn) {
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
            ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // Email/Username validation
        function vEmail() {
            const val = document.getElementById('email').value.trim();
            const inp = document.getElementById('email');
            const msg = document.getElementById('emailMsg');
            if (!val) { inp.className = ''; msg.innerHTML = ''; return false; }
            const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val) || val.length >= 3;
            inp.className = ok ? 'valid' : 'invalid';
            msg.className = 'msg ' + (ok ? 'ok' : 'err');
            msg.textContent = ok ? '✓ Looks good' : '✗ Enter a valid email or username';
            return ok;
        }

        // Password validation
        function vPass() {
            const val = document.getElementById('password').value;
            const inp = document.getElementById('password');
            const msg = document.getElementById('passMsg');
            if (!val) { inp.className = ''; msg.innerHTML = ''; return false; }
            const ok = val.length >= 6;
            inp.className = ok ? 'valid' : 'invalid';
            msg.className = 'msg ' + (ok ? 'ok' : 'err');
            msg.textContent = ok ? '✓ Password looks good' : '✗ At least 6 characters required';
            return ok;
        }

        function togglePw() {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            document.getElementById('eyeBtn').textContent = inp.type === 'password' ? '👁' : '🙈';
        }

        function shakeCard() {
            const card = document.getElementById('card');
            const moves = ['-8px', '8px', '-5px', '5px', '0'];
            moves.forEach((v, i) => setTimeout(() => card.style.transform = `translateX(${v})`, i * 75));
            setTimeout(() => card.style.transform = '', 400);
        }

        // Login handler (simulates success & redirects to YoungBot Academy)
        function handleLogin(e) {
            addRipple(e, document.getElementById('loginBtn'));
            const emailOk = vEmail();
            const passOk = vPass();
            if (!emailOk || !passOk) {
                shakeCard();
                return;
            }
            const btn = document.getElementById('loginBtn');
            const btnTxt = document.getElementById('btnTxt');
            const spin = document.getElementById('spin');
            btnTxt.style.display = 'none';
            spin.style.display = 'block';
            btn.disabled = true;
            setTimeout(() => {
                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').style.display = 'flex';
                localStorage.setItem('yb_logged_in', 'true');
                // After success, redirect to slider page
                setTimeout(() => {
                    window.location.href = 'slider.html';
                }, 2000);
            }, 1800);
        }

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const btn = document.getElementById('loginBtn');
                if (btn && !btn.disabled) handleLogin(e);
            }
        });
    </script>
</body>

</html>
